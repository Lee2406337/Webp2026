<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EX#7 打字機消消樂</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      background-color: #f8f9fa;
    }

    .game-box {
      max-width: 700px;
      margin: 60px auto;
      background: #fff;
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    #container {
      min-height: 80px;
      font-size: 2rem;
      font-weight: bold;
      letter-spacing: 6px;
      padding: 16px;
      border: 2px solid #dee2e6;
      border-radius: 12px;
      background-color: #f1f3f5;
      margin-bottom: 20px;
      word-break: break-all;
    }

    #typedKey {
      font-size: 1.2rem;
      color: #0d6efd;
      font-weight: 600;
    }

    #wrongCount {
      font-size: 1.1rem;
      color: #dc3545;
      font-weight: 600;
    }

    .hint {
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="game-box">
      <h1 class="mb-3">EX#7：打字機消消樂</h1>
      <p class="hint">
        請直接按鍵盤。如果按下的字元和目前字串第一個字元相同，就會消掉第一個字元。<br>
        連續打錯 3 次時，除了原本增加的亂數字串外，會再額外增加 3 個亂數字元。
      </p>

      <div id="container"></div>

      <div class="mb-2">
        你剛剛按的是：<span id="typedKey">-</span>
      </div>

      <div class="mb-3">
        連續打錯次數：<span id="wrongCount">0</span>
      </div>

      <div class="d-flex gap-2">
        <button id="resetBtn" class="btn btn-primary">重新開始</button>
        <button id="clearBtn" class="btn btn-outline-danger">清空字串</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
