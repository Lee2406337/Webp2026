<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EX#8 - Ajax 實作練習</title>
  <style>
    table {
      font-family: Arial, Helvetica, sans-serif;
      border-collapse: collapse;
      width: 100%;
    }

    td, th {
      border: 1px solid #ddd;
      padding: 6px;
    }

    tr:nth-child(even) {
      background-color: #f2f2f2;
    }

    tr:hover {
      background-color: #ddd;
    }

    th {
      padding-top: 12px;
      padding-bottom: 12px;
      text-align: left;
      background-color: #04AA6D;
      color: white;
    }

    body {
      margin: 30px;
      font-family: "Microsoft JhengHei", Arial, sans-serif;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 8px 14px;
      margin-bottom: 15px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>景點觀光展覽資訊</h1>

  <button id="loadBtn">載入資料</button>

  <table>
    <thead>
      <tr>
        <th>名稱</th>
        <th>地點</th>
        <th>開始日期</th>
        <th>結束日期</th>
      </tr>
    </thead>
    <tbody id="demo">
      <tr>
        <td colspan="4">尚未載入資料</td>
      </tr>
    </tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
