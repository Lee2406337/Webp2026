<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ex#5 - 按鈕生成和刪除</title>

  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>
<body class="bg-light">

  <div class="container py-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h1 class="mb-3">ex#5 - 按鈕生成和刪除</h1>
        <p class="text-muted">
          新增按鈕時會自動補上缺少的編號，刪除時可先選擇目標再刪除。
        </p>

        <div class="mb-3 d-flex flex-wrap gap-2">
          <button id="addBtn" class="btn btn-primary">新增按鈕</button>
          <button id="deleteBtn" class="btn btn-warning">刪除選定按鈕</button>
          <button id="clearBtn" class="btn btn-danger">全部刪除</button>
        </div>

        <div class="mb-3">
          <label for="deleteTarget" class="form-label">選擇要刪除的按鈕</label>
          <select id="deleteTarget" class="form-select">
            <option value="">請先選擇按鈕</option>
          </select>
        </div>

        <div id="buttonContainer" class="d-flex flex-wrap gap-2 border rounded p-3 bg-white">
          <!-- 動態按鈕會加在這裡 -->
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
